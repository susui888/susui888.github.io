    <style>
        /* --- Core Root Variables (Kept as is) --- */
        :root {
            --book-brown: #8B4513;
            --paper-bg: #fdfdfb;
            --top-bar-bg: #f8f9fa;
            --text-main: #2c2c2c;
            --border-color: #eee5d8;
        }

        /* --- General Typography & Colors (Universal) --- */
        body {
            background-color: var(--paper-bg) !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }

        h1, h2, h3, h4, .text-custom-brown {
            color: var(--book-brown) !important;
            font-family: 'Geist Sans', sans-serif !important;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        code, pre {
            font-family: 'JetBrains Mono', monospace !important;
            background-color: rgba(0, 0, 0, 0.05);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* --- Sidebar Appearance (Kept important styles) --- */
        .sidebar.bg-light {
            background-color: #f8f5ee !important;
            border-right: 1px solid var(--border-color);
        }

        .sidebar .nav-pills .nav-link.active {
            background-color: var(--book-brown) !important;
            color: white !important;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .sidebar .nav-pills .nav-link:hover:not(.active) {
            background-color: #ede2cf !important;
            color: var(--book-brown) !important;
            transform: translateX(5px);
            transition: all 0.2s ease;
        }

        /* --- Layout Logic (IMPORTANT: Conditional split) --- */

        /* Desktop View: Keep your original height-constrained layout */
        @media (min-width: 768px) {
            html, body {
                height: 100%;
                overflow: hidden;
            }

            main.d-flex {
                height: 100vh;
                overflow: hidden;
            }

            .sidebar {
                height: 100vh;
                overflow-y: auto;
                width: 280px;
            }

            .main-content {
                height: 100vh;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
            }
        }

        /* Mobile View: Allow natural scrolling and responsive structure */
        @media (max-width: 767.98px) {
            html, body {
                height: auto;
                overflow: visible;
            }

            main.d-flex {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100% !important;
                height: auto;
                min-height: auto !important;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .main-content {
                height: auto;
                overflow: visible;
            }

            .top-bar {
                position: sticky;
                top: 0;
            }

            .b-example-vr {
                display: none;
            }

            /* Hide divider on mobile */
        }

        /* --- Top Bar Styling (Common) --- */
        .top-bar {
            height: 45px;
            min-height: 45px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--top-bar-bg);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            z-index: 10;
            margin-bottom: 1.5rem;
        }

        .breadcrumb-text {
            font-size: 0.85rem;
            color: #888;
        }

        .breadcrumb-text b {
            color: var(--text-main);
            font-weight: 500;
        }

        .dropdown-item:hover {
            background-color: var(--book-brown) !important;
            color: #fff !important;
        }
    </style>

</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11.13.0/dist/mermaid.min.js"></script>

<script>
    mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'base',
        themeVariables: {
            primaryColor: '#fdfdfb',
            primaryTextColor: '#8B4513',
            primaryBorderColor: '#8B4513',
            lineColor: '#5d2e0d',
            fontFamily: 'Inter, sans-serif'
        }
    });

    document.addEventListener('shown.bs.collapse', function (event) {
        const container = event.target;
        const mermaidDiv = container.querySelector('.mermaid');

        if (mermaidDiv && !mermaidDiv.querySelector('svg')) {
            const id = 'mermaid-svg-' + Math.random().toString(36).substr(2, 9);
            const content = mermaidDiv.textContent.trim();

            mermaid.render(id, content).then(({svg}) => {
                mermaidDiv.innerHTML = svg;
                const svgElement = mermaidDiv.querySelector('svg');
                if (svgElement) {
                    svgElement.style.maxWidth = '100%';
                    svgElement.style.height = 'auto';
                }
            }).catch(err => {
                console.error("Mermaid Render Error:", err);
            });
        }
    });
</script>

{% include icons.svg %}

<main class="d-flex flex-nowrap">
    {% include sidebar.html %}

    <div class="b-example-divider b-example-vr"></div>

    <div class="flex-grow-1 main-content">

            {{ content }}
        </div>

</main>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        })
    });

    async function fetchRepoStatus() {
        const owner = 'susui888';
        const repo = 'CoolLib_Android';
        const statusElement = document.getElementById('ci-status-text');
        const dotElement = document.getElementById('status-dot');

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=1`);
            const data = await response.json();

            if (data.workflow_runs && data.workflow_runs.length > 0) {
                const lastRun = data.workflow_runs[0];

                // 1. 计算耗时 (Duration)
                const startTime = new Date(lastRun.run_started_at);
                const endTime = new Date(lastRun.updated_at);
                const durationMs = endTime - startTime;
                const durationMin = Math.floor(durationMs / 60000);
                const durationSec = ((durationMs % 60000) / 1000).toFixed(0);

                // 2. 格式化状态
                const status = lastRun.conclusion; // success, failure, cancelled
                const timeAgo = new Intl.RelativeTimeFormat('en', {numeric: 'auto'}).format(
                    Math.ceil((endTime - new Date()) / 3600000 / 24), 'day'
                );

                // 3. 更新 UI
                if (status === 'success') {
                    dotElement.className = 'rounded-circle me-2 status-success'; // 应用绿色和动画
                    statusElement.innerText = `Passed in ${durationMin}m ${durationSec}s`;
                } else {
                    dotElement.className = 'rounded-circle me-2 status-failure'; // 应用红色，停止动画
                    statusElement.innerText = `Android CI: ${status}`;
                }
            }
        } catch (error) {
            dotElement.className = 'rounded-circle me-2'; // 恢复灰色
            statusElement.innerText = "CI Status: Offline";
        }
    }

    document.addEventListener('DOMContentLoaded', fetchRepoStatus);
</script>

</body>
</html>
