<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | Ryan Su</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/inter-ui@3.19.3/inter.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jetbrains-mono@1.0.6/css/jetbrains-mono.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{{ '/assets/css/bootstrap.min.css' | relative_url }}">
    <script src="{{ '/assets/js/bootstrap.bundle.min.js' | relative_url }}"></script>
    <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}" media="print">

    <style>
        /* --- Core Root Variables (Kept as is) --- */
        :root {
            --book-brown: #8B4513;
            --paper-bg: #fdfdfb;
            --top-bar-bg: #f8f9fa;
            --text-main: #2c2c2c;
            --border-color: #eee5d8;
        }

        /* --- General Typography & Colors (Universal) --- */
        body {
            background-color: var(--paper-bg) !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }

        h1, h2, h3, h4, .text-custom-brown {
            color: var(--book-brown) !important;
            font-family: 'Geist Sans', sans-serif !important;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        code, pre {
            font-family: 'JetBrains Mono', monospace !important;
            background-color: rgba(0,0,0,0.05);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* --- Sidebar Appearance (Kept important styles) --- */
        .sidebar.bg-light {
            background-color: #f8f5ee !important;
            border-right: 1px solid var(--border-color);
        }

        .sidebar .nav-pills .nav-link.active {
            background-color: var(--book-brown) !important;
            color: white !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .sidebar .nav-pills .nav-link:hover:not(.active) {
            background-color: #ede2cf !important;
            color: var(--book-brown) !important;
            transform: translateX(5px);
            transition: all 0.2s ease;
        }

        /* --- Layout Logic (IMPORTANT: Conditional split) --- */

        /* Desktop View: Keep your original height-constrained layout */
        @media (min-width: 768px) {
            html, body { height: 100%; overflow: hidden; }
            main.d-flex { height: 100vh; overflow: hidden; }
            .sidebar { height: 100vh; overflow-y: auto; width: 280px; }
            .main-content { height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        }

        /* Mobile View: Allow natural scrolling and responsive structure */
        @media (max-width: 767.98px) {
            html, body { height: auto; overflow: visible; }
            main.d-flex { flex-direction: column; height: auto; }
            .sidebar { width: 100% !important; height: auto; min-height: auto !important; border-right: none; border-bottom: 1px solid var(--border-color); }
            .main-content { height: auto; overflow: visible; }
            .top-bar { position: sticky; top: 0; }
            .b-example-vr { display: none; } /* Hide divider on mobile */
        }

        /* --- Top Bar Styling (Common) --- */
        .top-bar {
            height: 45px;
            min-height: 45px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--top-bar-bg);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            z-index: 10;
            margin-bottom: 1.5rem;
        }

        .breadcrumb-text {
            font-size: 0.85rem;
            color: #888;
        }

        .breadcrumb-text b {
            color: var(--text-main);
            font-weight: 500;
        }

        .dropdown-item:hover { background-color: var(--book-brown) !important; color: #fff !important; }


    </style>

</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11.13.0/dist/mermaid.min.js"></script>

<script>
    mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'base',
        themeVariables: {
            primaryColor: '#fdfdfb',
            primaryTextColor: '#8B4513',
            primaryBorderColor: '#8B4513',
            lineColor: '#5d2e0d',
            fontFamily: 'Inter, sans-serif'
        }
    });

    document.addEventListener('shown.bs.collapse', function (event) {
        const container = event.target;
        const mermaidDiv = container.querySelector('.mermaid');

        if (mermaidDiv && !mermaidDiv.querySelector('svg')) {
            const id = 'mermaid-svg-' + Math.random().toString(36).substr(2, 9);
            const content = mermaidDiv.textContent.trim();

            mermaid.render(id, content).then(({ svg }) => {
                mermaidDiv.innerHTML = svg;
                const svgElement = mermaidDiv.querySelector('svg');
                if (svgElement) {
                    svgElement.style.maxWidth = '100%';
                    svgElement.style.height = 'auto';
                }
            }).catch(err => {
                console.error("Mermaid Render Error:", err);
            });
        }
    });
</script>

{% include icons.svg %}

<main class="d-flex flex-nowrap">
    {% include sidebar.html %}

    <div class="b-example-divider b-example-vr"></div>

    <div class="flex-grow-1 main-content">
        <header class="top-bar">
            <button class="btn d-md-none me-2 p-0 border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="bi bi-list fs-3 text-custom-brown"></i>
            </button>

            <div class="breadcrumb-text">
                Ryan Su / <b>{{ page.title }}</b>
            </div>
        </header>

        <div class="container mt-5 mb-5" style="max-width: 900px;">
            {{ content }}
        </div>
    </div>
</main>


</body>
</html>
